name: paymanapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.4+11

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  in_app_update: ^4.2.2
  url_launcher: ^6.2.1
  easebuzz_flutter: ^0.0.1
  jwt_decode: ^0.3.1
  image_picker: ^1.1.2
  audioplayers: ^5.2.1
  path_provider: ^2.1.2
  intl: ^0.19.0
  pdf: ^3.10.4
  dropdown_button2: ^2.3.9
  razorpay_flutter: ^1.3.6
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_secure_storage: ^9.0.0
  sms_autofill: ^2.4.0
  jwt_decoder: ^2.0.1
  webview_flutter: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/success-340660.mp3
    - assets/fonts/NotoSans-Regular.ttf
    - assets/icons/
    - assets/banners/
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon/FinalIcon.png"
  adaptive_icon_foreground: "assets/images/icon/FinalIcon.png"
  adaptive_icon_background: "#ffffff"  # Change background color if needed